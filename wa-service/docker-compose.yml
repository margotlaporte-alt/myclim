services:
  wa-service:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - wa_data:/app/data
    environment:
      PORT: 3001
      CACHE_TTL_SECONDS: 21600      # 6 h
      SYNC_CRON: "0 3 * * *"       # 3:00 AM daily
      API_KEY: ${API_KEY:-}         # set in .env or leave empty
      DB_PATH: /app/data/wa_cache.db

volumes:
  wa_data:
