[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# World Athletics proxy — maps the wa-service URL pattern to the Netlify Function
[[redirects]]
  from = "/api/wa/athlete/:waid/performances"
  to   = "/.netlify/functions/wa-athlete?waid=:waid"
  status = 200

[[redirects]]
  from = "/api/wa/athlete/:waid"
  to   = "/.netlify/functions/wa-athlete?waid=:waid"
  status = 200

# SPA fallback — must stay last
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
